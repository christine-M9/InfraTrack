<!DOCTYPE html>
<html>
<head>
<title>Reports</title>
<link rel="stylesheet" href="/static/layout.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="sidebar"></div>

<div class="topbar">
<h3>System Reports</h3>
</div>

<div class="container">

<div class="card">
<h3>Projects by Directorate</h3>
<canvas id="dirChart"></canvas>
</div>

<div class="card">
<h3>Budget Utilization</h3>
<canvas id="budgetChart"></canvas>
</div>

</div>

<script>

async function loadReports(){

const projectsRes = await fetch("/projects")
const directoratesRes = await fetch("/directorates")

const projects = await projectsRes.json()
const directorates = await directoratesRes.json()

// Projects per directorate
const dirMap = {}

projects.forEach(p=>{
dirMap[p.directorate] = (dirMap[p.directorate] || 0) + 1
})

new Chart(document.getElementById("dirChart"),{
type:"pie",
data:{
labels:Object.keys(dirMap),
datasets:[{
data:Object.values(dirMap)
}]
}
})

// Budget utilization
new Chart(document.getElementById("budgetChart"),{
type:"bar",
data:{
labels:projects.map(p=>p.name),
datasets:[
{label:"Budget", data:projects.map(p=>p.budget)},
{label:"Spent", data:projects.map(p=>p.spent)}
]
}
})
}

loadReports()
// Load the sidebar dynamically
  fetch('/static/sidebar.html')
    .then(response => response.text())
    .then(html => document.getElementById('sidebar').innerHTML = html);
</script>

</body>
</html>
