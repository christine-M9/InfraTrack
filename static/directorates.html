<!DOCTYPE html>
<html>
<head>
<title>KeNHA IMS - Directorates</title>
<link rel="stylesheet" href="/static/layout.css">
</head>
<body>

<div class="sidebar">
<h2>KeNHA IMS</h2>
<a href="/">Dashboard</a>
<a href="/projects-page">Projects</a>
<a href="/directorates-page">Directorates</a>
<a href="/contractors-page">Contractors</a>
<a href="/reports-page">Reports</a>
</div>

<div class="topbar">
<h3>Directorates Overview</h3>
</div>

<div class="container">

<div class="card">
<h3>Add Directorate</h3>
<input id="dname" placeholder="Directorate Name">
<button onclick="createDirectorate()">Create</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Projects</th>
<th>Total Budget (KES)</th>
<th>Completion %</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>

async function loadDirectorates(){
const res = await fetch("/directorates")
const data = await res.json()

tableBody.innerHTML = ""

data.forEach(d => {

let statusBadge = ""

if(d.has_delayed){
statusBadge = "<span class='badge badge-danger'>Delayed</span>"
}else{
statusBadge = "<span class='badge badge-success'>Healthy</span>"
}

tableBody.innerHTML += `
<tr>
<td>
<a href="/directorate-projects-page?id=${d.id}" style="text-decoration:none;color:#1d4ed8;font-weight:600;">
${d.name}
</a>
</td>
<td>${d.project_count}</td>
<td>${d.total_budget.toLocaleString()}</td>
<td>${d.completion_percent.toFixed(1)}%</td>
<td>${statusBadge}</td>
</tr>
`
})
}

async function createDirectorate(){
const name = document.getElementById("dname").value

await fetch("/directorates",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name})
})

document.getElementById("dname").value=""
loadDirectorates()
}

loadDirectorates()

</script>

</body>
</html>
