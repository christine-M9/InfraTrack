<!DOCTYPE html>
<html>
<head>
    <title>KeNHA IMS - Contractors</title>
    <link rel="stylesheet" href="/static/layout.css">
    <style>
        .container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { cursor: pointer; background: #0f766e; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        .button { padding: 5px 10px; background: #0f766e; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .button:hover { background: #07554f; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>KeNHA IMS</h2>
    <a href="/">Dashboard</a>
    <a href="/projects-page">Projects</a>
    <a href="/directorates-page">Directorates</a>
    <a href="/contractors-page">Contractors</a>
    <a href="/reports-page">Reports</a>
</div>

<div class="topbar">
    <h3>Contractors</h3>
</div>

<div class="container">
    <div class="card">
        <input type="text" id="searchInput" placeholder="Search contractor..." onkeyup="applyFilters()">
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th onclick="sortTable('name')">Name</th>
                    <th onclick="sortTable('contact')">Contact</th>
                    <th onclick="sortTable('project_count')">Total Projects</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let allContractors = []
let sortDirection = 1

async function loadContractors(){
    const res = await fetch("/contractors")
    allContractors = await res.json()
    applyFilters()
}

function applyFilters(){
    const search = document.getElementById("searchInput").value.toLowerCase()
    const filtered = allContractors.filter(c => 
        c.name.toLowerCase().includes(search) ||
        (c.contact && c.contact.toLowerCase().includes(search))
    )
    renderTable(filtered)
}

function renderTable(data){
    const tbody = document.getElementById("tableBody")
    tbody.innerHTML = ""
    data.forEach(c=>{
        tbody.innerHTML += `
            <tr>
                <td>${c.name}</td>
                <td>${c.contact || "N/A"}</td>
                <td>${c.project_count}</td>
                <td>
                    <a class="button" href="/contractor-projects-page?id=${c.id}&name=${encodeURIComponent(c.name)}">View Projects</a>
                </td>
            </tr>
        `
    })
}

function sortTable(field){
    sortDirection *= -1
    allContractors.sort((a,b)=>{
        if(a[field]<b[field]) return -1*sortDirection
        if(a[field]>b[field]) return 1*sortDirection
        return 0
    })
    applyFilters()
}

loadContractors()
</script>
</body>
</html>
