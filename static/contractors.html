<!DOCTYPE html>
<html>
<head>
    <title>KeNHA IMS - Contractors</title>
    <link rel="stylesheet" href="/static/layout.css">
    <style>
        .container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #0f766e; color: white; cursor: pointer; }
        tr:nth-child(even){ background: #f2f2f2; }
        .button { padding: 5px 10px; background: #0f766e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .button:hover{ background: #07554f; }
    </style>
</head>
<body>
<div id="sidebar"></div>
<div class="container">
    <h3>Contractors</h3>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Contact</th>
                <th>Total Projects</th>
                <th>View Projects</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
if(!localStorage.getItem("token")) window.location.href="/login"

async function loadContractors(){
    const res = await fetch("/contractors", { headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` } })
    const contractors = await res.json()
    const tbody = document.getElementById("tableBody")
    tbody.innerHTML=""
    contractors.forEach(c=>{
        tbody.innerHTML += `
            <tr>
                <td>${c.name}</td>
                <td>${c.contact}</td>
                <td>${c.project_count}</td>
                <td><button class="button" onclick="viewProjects(${c.id}, '${c.name}')">View Projects</button></td>
            </tr>
        `
    })
}

function viewProjects(id,name){
    window.location.href=`/contractor-projects-page?id=${id}&name=${encodeURIComponent(name)}`
}

function logout(){ localStorage.removeItem("token"); window.location.href="/login" }

loadContractors()

// Load the sidebar dynamically
  fetch('/static/sidebar.html')
    .then(response => response.text())
    .then(html => document.getElementById('sidebar').innerHTML = html);
</script>
</body>
</html>
