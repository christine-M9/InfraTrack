<!DOCTYPE html>
<html>
<head>
<title>Contractors</title>
<link rel="stylesheet" href="/static/layout.css">
</head>
<body>

<div class="sidebar">
<h2>KeNHA IMS</h2>
<a href="/">Dashboard</a>
<a href="/projects-page">Projects</a>
<a href="/directorates-page">Directorates</a>
<a href="/contractors-page">Contractors</a>
<a href="/reports-page">Reports</a>
</div>

<div class="topbar">
<h3>Contractors</h3>
</div>

<div class="container">

<div class="card">
<h3>Add Contractor</h3>
<input id="cname" placeholder="Contractor Name">
<input id="contact" placeholder="Contact Info">
<button onclick="createContractor()">Create</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Contact</th>
<th>Total Projects</th>
<th>Action</th>
</tr>
</thead>
<tbody id="contractorTable"></tbody>
</table>

</div>

<script>

async function loadContractors(){
const res = await fetch("/contractors")
const data = await res.json()

contractorTable.innerHTML=""

data.forEach(c=>{
contractorTable.innerHTML+=`
<tr>
<td>${c.name}</td>
<td>${c.contact}</td>
<td>${c.project_count || 0}</td>
<td><button onclick="deleteContractor(${c.id})">Delete</button></td>
</tr>`
})
}

async function createContractor(){
const contractor={
name:document.getElementById("cname").value,
contact:document.getElementById("contact").value
}

await fetch("/contractors",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(contractor)
})

document.getElementById("cname").value=""
document.getElementById("contact").value=""
loadContractors()
}

async function deleteContractor(id){
await fetch("/contractors/"+id,{method:"DELETE"})
loadContractors()
}

loadContractors()

</script>

</body>
</html>
