<!DOCTYPE html>
<html>
<head>
<title>Projects</title>
<link rel="stylesheet" href="/static/layout.css">
</head>
<body>

<div class="sidebar">
<h2>KeNHA IMS</h2>
<a href="/">Dashboard</a>
<a href="/projects-page">Projects</a>
<a href="/directorates-page">Directorates</a>
<a href="/users-page">Users</a>
<a href="/reports-page">Reports</a>
</div>

<div class="topbar">
<h3>Projects</h3>
</div>

<div class="container">

<div class="card">
<h3>Add Project</h3>

<input id="name" placeholder="Project Name">

<select id="directorateSelect"></select>
<select id="contractorSelect"></select>

<input id="budget" type="number" placeholder="Budget">
<input id="spent" type="number" placeholder="Spent">

<button onclick="createProject()">Create</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Budget</th>
<th>Spent</th>
<th>Progress</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>

async function loadDirectorates(){
const res = await fetch("/directorates")
const data = await res.json()

directorateSelect.innerHTML = data.map(d =>
`<option value="${d.id}">${d.name}</option>`
).join("")
}

async function loadContractors(){
const res = await fetch("/contractors")
const data = await res.json()

contractorSelect.innerHTML = data.map(c =>
`<option value="${c.id}">${c.name}</option>`
).join("")
}

async function loadProjects(){
const res = await fetch("/projects")
const data = await res.json()

tableBody.innerHTML = ""

data.forEach(p=>{
tableBody.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.budget}</td>
<td>${p.spent}</td>
<td>${p.progress.toFixed(1)}%</td>
<td><button onclick="deleteProject(${p.id})">Delete</button></td>
</tr>`
})
}

async function createProject(){

const project = {
name: document.getElementById("name").value,
budget: Number(document.getElementById("budget").value),
spent: Number(document.getElementById("spent").value),
directorate_id: Number(document.getElementById("directorateSelect").value),
contractor_id: Number(document.getElementById("contractorSelect").value)
}

const res = await fetch("/projects",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(project)
})

if(!res.ok){
const err = await res.text()
alert("Error: " + err)
return
}

loadProjects()
}

async function deleteProject(id){
await fetch("/projects/"+id,{method:"DELETE"})
loadProjects()
}

loadDirectorates()
loadContractors()
loadProjects()

</script>

</body>
</html>
