<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeNHA IMS - Login/Register</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Roboto',sans-serif;}
body {
    min-height:100vh;
    background: url('/static/images/kenhaback.webp') no-repeat center center fixed;
    background-size: cover;
    color:#fff;
}
body::before {
    content:"";
    position:fixed; top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    z-index:0;
}
/* Header */
.header {
    position: relative;
    z-index:1;
    width:100%;
    text-align:center;
    padding:30px 20px 20px 20px;
}
.header img.logo { width:150px; margin-bottom:10px; }
.header h1 {
    color:#00e0c6;
    font-size:2.2rem;
    text-shadow:0 0 10px rgba(0,255,200,0.5);
}

/* Cards container */
.card-container {
    position: relative;
    z-index:1;
    display:flex;
    justify-content:center;
    margin-top:40px;
    min-height:300px;
}

/* Glass card */
.card {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.3);
    padding:40px 30px;
    width:320px;
    color:#fff;
    transition: transform 0.3s, box-shadow 0.3s, opacity 0.5s;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    position:absolute;
}
.card.hidden { opacity:0; pointer-events:none; transform:translateY(-20px);}
.card.visible { opacity:1; pointer-events:auto; transform:translateY(0);}
.card h2 { text-align:center; margin-bottom:25px; font-size:1.8rem; color:#00e0c6; text-shadow:0 0 5px rgba(0,255,200,0.5);}
input, select {
    width:100%; padding:12px 15px; margin:10px 0 20px 0;
    border-radius:10px; border:none; background: rgba(255,255,255,0.15);
    color:#fff; font-size:16px; outline:none; transition: background 0.3s;
}
input::placeholder, select option { color: rgba(255,255,255,0.7);}
input:focus, select:focus { background: rgba(255,255,255,0.25);}
button {
    width:100%; padding:12px; border-radius:10px; border:none;
    font-size:16px; cursor:pointer;
    background: linear-gradient(135deg,#00e0c6,#00bfa5); color:#fff;
    transition: all 0.3s;
}
button:hover { transform: scale(1.05); background: linear-gradient(135deg,#00bfa5,#00e0c6);}
.message { margin-bottom:15px; text-align:center; font-weight:500;}
.switch-link { margin-top:20px; font-size:14px; color:#ccc; text-align:center;}
.switch-link a { color:#00e0c6; text-decoration:none; font-weight:500; margin-left:5px; transition: color 0.3s;}
.switch-link a:hover { color:#00bfa5;}
.footer { width:100%; text-align:center; margin-top:30px; font-size:14px; color:#ccc; position:relative; bottom:0; padding:20px 0;}
@media(max-width:500px){ .card{width:90%; padding:30px 20px;} .header h1{font-size:1.8rem;} }
</style>
</head>
<body>

<div class="header">
    <img src="/static/images/kenhalogoo.jpeg" alt="KeNHA Logo" class="logo">
    <h1>Welcome to KeNHA IMS</h1>
</div>

<div class="card-container">
    <!-- Login Card -->
    <div id="loginCard" class="card visible">
        <h2>Login</h2>
        <div class="message" id="loginMessage"></div>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="switch-link">
            Not registered? <a href="#" id="showRegister">Sign up here</a>
        </div>
    </div>

    <!-- Register Card -->
    <div id="registerCard" class="card hidden">
        <h2>Register</h2>
        <div class="message" id="registerMessage"></div>
        <form id="registerForm">
            <input type="text" id="registerUsername" placeholder="Username" required>
            <input type="password" id="registerPassword" placeholder="Password" required>
            <select id="registerRole" required>
                <option value="Engineer">Engineer</option>
                <option value="DirectorGeneral">DirectorGeneral</option>
                <option value="Admin">Admin</option>
            </select>
            <button type="submit">Register</button>
        </form>
        <div class="switch-link">
            Already have an account? <a href="#" id="showLogin">Login here</a>
        </div>
    </div>
</div>

<div class="footer">© 2026 KeNHA Infrastructure Monitoring System</div>

<script>
// Toggle cards
const loginCard = document.getElementById('loginCard');
const registerCard = document.getElementById('registerCard');
document.getElementById('showRegister').addEventListener('click', e => {
    e.preventDefault();
    loginCard.classList.replace('visible','hidden');
    registerCard.classList.replace('hidden','visible');
});
document.getElementById('showLogin').addEventListener('click', e => {
    e.preventDefault();
    registerCard.classList.replace('visible','hidden');
    loginCard.classList.replace('hidden','visible');
});

// Login JS
const loginForm = document.getElementById("loginForm");
loginForm.addEventListener("submit", async e => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;
    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if(res.ok){
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("role", data.role);
            localStorage.setItem("directorate_id", data.directorate_id || "");
            document.getElementById("loginMessage").style.color = "green";
            document.getElementById("loginMessage").innerText = "Login successful! Redirecting...";
            // redirect based on role
            setTimeout(()=>{
                if(data.role === "Admin") window.location.href="/dashboard";
                else if(data.role === "DirectorGeneral") window.location.href="/directorates-page";
                else window.location.href="/directorate-projects-page";
            }, 1000);
        } else {
            document.getElementById("loginMessage").style.color = "red";
            document.getElementById("loginMessage").innerText = data.detail || "Login failed";
        }
    } catch(err){
        document.getElementById("loginMessage").style.color = "red";
        document.getElementById("loginMessage").innerText = "Server error. Try again later.";
    }
});

// Register JS
const registerForm = document.getElementById("registerForm");
registerForm.addEventListener("submit", async e => {
    e.preventDefault();
    const username = document.getElementById("registerUsername").value;
    const password = document.getElementById("registerPassword").value;
    const role = document.getElementById("registerRole").value;
    try {
        const res = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({username, password, role})
        });
        const data = await res.json();
        if(res.ok){
            document.getElementById("registerMessage").style.color = "green";
            document.getElementById("registerMessage").innerText = "Registration successful! You can login now.";
            registerForm.reset();
        } else {
            document.getElementById("registerMessage").style.color = "red";
            document.getElementById("registerMessage").innerText = data.detail || "Registration failed";
        }
    } catch(err){
        document.getElementById("registerMessage").style.color = "red";
        document.getElementById("registerMessage").innerText = "Server error. Try again later.";
    }
});
</script>
</body>
</html>
