<!DOCTYPE html>
<html>
<head>
<title>Project Detail</title>
<link rel="stylesheet" href="/static/layout.css">
</head>
<body>

<div id="sidebar"></div>

<div class="topbar">
<h3>Project Detail</h3>
</div>

<div class="container">

<div class="card" id="projectInfo"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search)
const id = params.get("id")

async function loadProject(){
const res = await fetch("/projects/" + id)

if(!res.ok){
projectInfo.innerHTML = "<h3>Project not found</h3>"
return
}

const p = await res.json()

document.getElementById("projectInfo").innerHTML = `
<h2>${p.name}</h2>
<p><b>Contractor:</b> ${p.contractor}</p>
<p><b>Budget:</b> ${p.budget}</p>
<p><b>Spent:</b> ${p.spent}</p>
<p><b>Progress:</b> ${p.progress}%</p>
<p><b>Status:</b> ${p.status}</p>
`
}

if(id){
loadProject()
}else{
projectInfo.innerHTML = "<h3>No project selected</h3>"
}

// Load the sidebar dynamically
  fetch('/static/sidebar.html')
    .then(response => response.text())
    .then(html => document.getElementById('sidebar').innerHTML = html);
</script>

</body>
</html>
