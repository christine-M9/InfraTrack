<!DOCTYPE html>
<html>
<head>
<title>Directorate Projects</title>
<link rel="stylesheet" href="layout.css">
</head>
<body>

<div class="sidebar">
<h2>KeNHA IMS</h2>
<a href="/">Dashboard</a>
<a href="/projects-page">Projects</a>
<a href="/directorates-page">Directorates</a>
<a href="/contractors-page">Contractors</a>
<a href="/reports-page">Reports</a>
</div>
<div class="topbar">
<h3 id="directorateTitle">Directorate Overview</h3>
</div>

<div class="container">

<!-- SUMMARY CARDS -->
<div class="card-grid">
<div class="card">
<h4>Total Projects</h4>
<p id="totalProjects">0</p>
</div>

<div class="card">
<h4>Total Budget</h4>
<p id="totalBudget">0</p>
</div>

<div class="card">
<h4>Completion</h4>
<p id="completionPercent">0%</p>
</div>
</div>

<!-- PROJECT TABLE -->
<div class="card">
<h3>Projects</h3>

<table class="styled-table">
<thead>
<tr>
<th>Name</th>
<th>Budget</th>
<th>Spent</th>
<th>Progress</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const id = params.get("id")

async function loadProjects(){

const res = await fetch("/projects")
const projects = await res.json()

const filtered = projects.filter(p => p.directorate_id == id)

let totalBudget = 0
let totalSpent = 0

tableBody.innerHTML = ""

filtered.forEach(p=>{

totalBudget += p.budget
totalSpent += p.spent

let statusClass = "status-green"
let status = "Healthy"

if(p.spent > p.budget){
status = "Over Budget"
statusClass = "status-red"
}

tableBody.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.budget.toLocaleString()}</td>
<td>${p.spent.toLocaleString()}</td>
<td>
<div class="progress-bar">
<div class="progress-fill" style="width:${p.progress}%"></div>
</div>
${p.progress.toFixed(1)}%
</td>
<td class="${statusClass}">
${status}
</td>
</tr>
`
})

document.getElementById("totalProjects").innerText = filtered.length
document.getElementById("totalBudget").innerText = totalBudget.toLocaleString()

let completion = 0
if(totalBudget > 0){
completion = (totalSpent / totalBudget) * 100
}

document.getElementById("completionPercent").innerText =
completion.toFixed(1) + "%"

}

loadProjects()

</script>

</body>
</html>
