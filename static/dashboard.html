<!DOCTYPE html>
<html>
<head>
<title>KeNHA IMS - Dashboard</title>
<link rel="stylesheet" href="/static/layout.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
<h2>KeNHA IMS</h2>
<a href="/">Dashboard</a>
<a href="/projects-page">Projects</a>
<a href="/directorates-page">Directorates</a>
<a href="/contractors-page">Contractors</a>
<a href="/reports-page">Reports</a>
</div>

<div class="topbar">
<h3>Infrastructure Monitoring System</h3>
<span>Admin</span>
</div>

<div class="container">

<!-- KPI GRID -->
<div class="card-grid">

<div class="card">
<h4>Total Projects</h4>
<p id="totalProjects">0</p>
</div>

<div class="card">
<h4>Active Projects</h4>
<p id="activeProjects">0</p>
</div>

<div class="card">
<h4>Total Budget (KES)</h4>
<p id="totalBudget">0</p>
</div>

</div>

<!-- CHART -->
<div class="card">
<h3>Budget vs Expenditure</h3>
<canvas id="budgetChart"></canvas>
</div>

</div>

<script>

async function loadDashboard(){
const res = await fetch("/projects")
if(!res.ok) return

const data = await res.json()

document.getElementById("totalProjects").innerText = data.length

document.getElementById("activeProjects").innerText =
data.filter(p => p.status === "Active").length

document.getElementById("totalBudget").innerText =
data.reduce((sum, p) => sum + p.budget, 0).toLocaleString()

new Chart(document.getElementById("budgetChart"),{
type:"bar",
data:{
labels:data.map(p => p.name),
datasets:[
{label:"Budget", data:data.map(p => p.budget)},
{label:"Spent", data:data.map(p => p.spent)}
]
},
options:{
responsive:true,
plugins:{
legend:{position:"top"}
}
}
})
}

loadDashboard()

</script>

</body>
</html>
