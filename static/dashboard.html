<!DOCTYPE html>
<html>
<head>
    <title>KeNHA IMS - Dashboard</title>
    <link rel="stylesheet" href="/static/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card-grid { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:30px; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); flex:1; min-width:150px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { padding:8px; border:1px solid #ddd; text-align:left; }
        th { background:#0f766e; color:white; cursor:pointer; }
        tr:nth-child(even){ background:#f2f2f2; }
        .button { padding:5px 10px; background:#0f766e; color:white; border:none; border-radius:5px; cursor:pointer; }
        .button:hover{ background:#07554f; }
        h4, h3{ margin:0 0 10px 0; }
    </style>
</head>
<body>

<div id="sidebar"></div>

<div class="topbar">
    <h3>Infrastructure Monitoring System</h3>
    <span id="currentUser">User</span>
</div>

<div class="container">

    <!-- KPI GRID -->
    <div class="card-grid">
        <div class="card">
            <h4>Total Projects</h4>
            <p id="totalProjects">0</p>
        </div>
        <div class="card">
            <h4>Active Projects</h4>
            <p id="activeProjects">0</p>
        </div>
        <div class="card">
            <h4>Total Budget (KES)</h4>
            <p id="totalBudget">0</p>
        </div>
    </div>

    <!-- CHART -->
    <div class="card">
        <h3>Budget vs Expenditure</h3>
        <canvas id="budgetChart"></canvas>
    </div>

   

<script>
const token = localStorage.getItem("token")
if(!token) window.location.href = "/"

document.getElementById("currentUser").innerText = token ? "Admin" : "User"

async function loadDashboard(){
    // ---------- PROJECTS ----------
    const res = await fetch("/projects", {
        headers: {"Authorization": "Bearer " + token}
    })
    if(!res.ok) { alert("Failed to load projects"); return; }
    const data = await res.json()
    document.getElementById("totalProjects").innerText = data.length
    document.getElementById("activeProjects").innerText = data.filter(p=>p.status==="Active").length
    document.getElementById("totalBudget").innerText = data.reduce((sum,p)=>sum+p.budget,0).toLocaleString()

    new Chart(document.getElementById("budgetChart"),{
        type:"bar",
        data:{
            labels: data.map(p=>p.name),
            datasets:[
                {label:"Budget", data:data.map(p=>p.budget), backgroundColor:"#0f766e"},
                {label:"Spent", data:data.map(p=>p.spent), backgroundColor:"#f59e0b"}
            ]
        },
        options:{ responsive:true, plugins:{ legend:{position:"top"} } }
    })

}
// Logout
function logout(){
    localStorage.removeItem("token")
    window.location.href = "/"
}

loadDashboard()

// Load the sidebar dynamically
  fetch('/static/sidebar.html')
    .then(response => response.text())
    .then(html => document.getElementById('sidebar').innerHTML = html);
</script>

</body>
</html>
